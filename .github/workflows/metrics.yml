name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]   # runs daily
  workflow_dispatch:                  # lets you trigger it manually
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # --- Isometric Calendar ---
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year   # or "half-year"

      # --- Achievements ---
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact     # or "detailed"
          plugin_achievements_threshold: C         # min rank to show

      # --- AniList ---
      - name: AniList
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.anilist.svg
          token: NOT_NEEDED                        # AniList needs no GitHub token
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: YOUR_ANILIST_USERNAME   # set this if different from GitHub
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching
          plugin_anilist_limit: 2
